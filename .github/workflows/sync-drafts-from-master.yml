# After every push to `master`, merge those commits into `drafts` and push.
# Keeps `drafts` up to date with frontend/tooling changes on `master` without manual merges.
#
# Conflicts are auto-resolved in master's favour (-X theirs), since this sync's
# sole purpose is to bring master's changes into drafts.

name: Sync drafts from master

on:
  push:
    branches: [master]
  workflow_dispatch: {}

concurrency:
  group: sync-drafts
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  merge-master-into-drafts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge master into drafts and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin master drafts
          git checkout drafts
          git merge origin/master --no-edit -X theirs -m "Merge branch 'master' into drafts [sync]"
          git push origin drafts
